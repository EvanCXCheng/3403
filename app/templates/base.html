<!DOCTYPE html>

                "on-error-container": "#ffdad6",

        "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",

                "headline": ["Space Grotesk"],
                "body": ["Manrope"],
                "label": ["Inter"]

{% block headers %}{% endblock %}

</head>
{% block body_class %}{%endblock %}
<nav class="fixed top-0 w-full z-50 bg-[#0b1326]/60 backdrop-blur-xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] flex justify-between items-center px-8 h-20 w-full">
<div class="flex items-center gap-8">
<span class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-cyan-700 bg-clip-text text-transparent font-headline tracking-tight">MED-SEG ALPHA</span>
<div class="hidden md:flex gap-6">
<a class="text-slate-400 hover:text-slate-200 transition-colors font-headline" href="{{ url_for('index') }}">Home</a>
<a class="text-slate-400 hover:text-slate-200 transition-colors font-headline" href="{{ url_for('leaderboard') }}">Leaderboard</a>
<a class="text-slate-400 hover:text-slate-200 transition-colors font-headline" href="{{ url_for('profile_default') }}">Profile</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-slate-400 hover:bg-white/5 rounded-xl transition-all">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 text-slate-400 hover:bg-white/5 rounded-xl transition-all">

</button>

</div>

{% block content %}{% endblock %}

<div class="flex flex-col md:flex-row justify-between items-center gap-6 max-w-7xl mx-auto">
<div class="flex flex-col gap-2 items-center md:items-start">
<span class="text-slate-500 font-headline font-bold text-xl">MED-SEG</span>
<p class="text-slate-500 font-body text-xs uppercase tracking-widest">© 2026 ALL RIGHTS RESERVED.</p>
</div>
<div class="flex gap-8">
<a class="text-slate-500 hover:text-cyan-400 transition-colors font-body text-xs uppercase tracking-widest" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:text-cyan-400 transition-colors font-body text-xs uppercase tracking-widest" href="#">Institutional Access</a>
</div>
</div>
